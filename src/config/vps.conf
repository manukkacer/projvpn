#!/bin/bash

# VPS Mode Configuration
# Auto-generated during installation
# DO NOT MODIFY THIS FILE MANUALLY

VPS_MODE="HIGH_SPEC"
CPU_CORES="2"
RAM_MB="2048"
INSTALL_DATE="$(date)"
PANEL_VERSION="4.0"

# Cache Refresh Intervals (in seconds)
if [[ "$VPS_MODE" == "LOW_SPEC" ]]; then
    CACHE_REFRESH=1800  # 30 minutes
else
    CACHE_REFRESH=600   # 10 minutes
fi

# Logging Level
if [[ "$VPS_MODE" == "LOW_SPEC" ]]; then
    LOG_LEVEL="error"
else
    LOG_LEVEL="info"
fi

# Service Features
ENABLE_MONITORING=$([ "$VPS_MODE" = "HIGH_SPEC" ] && echo "1" || echo "0")
ENABLE_DETAILED_STATS=$([ "$VPS_MODE" = "HIGH_SPEC" ] && echo "1" || echo "0")
ENABLE_REAL_TIME_CHECKING=$([ "$VPS_MODE" = "HIGH_SPEC" ] && echo "1" || echo "0")

# Resource Limits
if [[ "$VPS_MODE" == "LOW_SPEC" ]]; then
    MAX_PROCESSES=5
    MAX_BACKGROUND_JOBS=1
    MONITORING_INTERVAL=300  # 5 minutes
else
    MAX_PROCESSES=20
    MAX_BACKGROUND_JOBS=5
    MONITORING_INTERVAL=60   # 1 minute
fi
